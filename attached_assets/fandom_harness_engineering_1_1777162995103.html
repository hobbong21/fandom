<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팬덤 커뮤니티 — AI 하네스 엔지니어링</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f12;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0eeff;
    --text2: #a09bbf;
    --text3: #5f5a7a;
    --purple: #7c6dfa;
    --purple-bg: rgba(124,109,250,0.12);
    --pink: #e96aa8;
    --pink-bg: rgba(233,106,168,0.12);
    --green: #4dd994;
    --green-bg: rgba(77,217,148,0.1);
    --red: #f06060;
    --red-bg: rgba(240,96,96,0.1);
    --amber: #f0b429;
    --amber-bg: rgba(240,180,41,0.1);
    --teal: #38d4c0;
    --teal-bg: rgba(56,212,192,0.1);
    --font: 'Pretendard', -apple-system, system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Mono', monospace;
    --radius: 10px;
    --radius-lg: 14px;
  }
  html { font-family: var(--font); font-size: 14px; background: var(--bg); color: var(--text); }
  body { min-height: 100vh; }

  /* Layout */
  .shell { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }
  .topbar { padding: 14px 24px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); position: sticky; top: 0; z-index: 10; }
  .topbar-title { display: flex; align-items: center; gap: 10px; }
  .logo { width: 28px; height: 28px; border-radius: 8px; background: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .topbar h1 { font-size: 15px; font-weight: 600; }
  .topbar-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .content { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 57px); overflow: hidden; }
  .sidebar { border-right: 0.5px solid var(--border); overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .main { overflow-y: auto; padding: 20px 24px; }

  /* Metrics bar */
  .metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 22px; }
  .metric { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 16px; }
  .metric-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .metric-val { font-size: 24px; font-weight: 700; }
  .prog { height: 4px; border-radius: 99px; background: var(--surface2); margin-top: 6px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.6s ease; }

  /* Test case rows */
  .section-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 4px 4px; }
  .tc-row { padding: 9px 12px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid transparent; transition: background 0.12s; }
  .tc-row:hover { background: var(--surface2); }
  .tc-row.active { background: var(--purple-bg); border-color: rgba(124,109,250,0.3); }
  .tc-id { font-size: 10px; font-family: var(--mono); color: var(--text3); }
  .tc-title { font-size: 13px; font-weight: 500; margin: 3px 0; }
  .tc-meta { display: flex; align-items: center; gap: 6px; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
  .pass { background: var(--green-bg); color: var(--green); }
  .fail { background: var(--red-bg); color: var(--red); }
  .pending { background: rgba(255,255,255,0.05); color: var(--text3); }
  .cat-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; }

  /* Detail */
  .detail-header { margin-bottom: 18px; }
  .detail-id { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-bottom: 4px; }
  .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .detail-actions { margin-left: auto; display: flex; gap: 8px; }

  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 12px; }
  .card-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 8px; }
  .card-text { font-size: 13px; line-height: 1.7; color: var(--text2); white-space: pre-wrap; }
  .card-mono { font-family: var(--mono); font-size: 12px; color: var(--purple); background: var(--purple-bg); padding: 10px 12px; border-radius: 8px; line-height: 1.6; }

  /* Score */
  .score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .score-big { font-size: 32px; font-weight: 800; }
  .criteria-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .criteria-row:last-child { border-bottom: none; }
  .crit-icon { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .crit-pass { background: var(--green-bg); }
  .crit-fail { background: var(--red-bg); }
  .crit-name { flex: 1; }
  .crit-weight { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .score-segs { display: flex; gap: 3px; margin-top: 8px; }
  .seg { height: 4px; flex: 1; border-radius: 2px; }

  /* Buttons */
  .btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border2); background: var(--surface2); color: var(--text); transition: background 0.12s; font-family: var(--font); }
  .btn:hover { background: rgba(255,255,255,0.08); }
  .btn-primary { background: var(--purple); border-color: var(--purple); color: #fff; }
  .btn-primary:hover { background: #8f82fc; }
  .btn-success { background: var(--green-bg); border-color: rgba(77,217,148,0.3); color: var(--green); }

  /* Priority colors */
  .crit { color: var(--red); }
  .high { color: var(--amber); }
  .medium { color: var(--teal); }

  /* Custom tab */
  .tabs { display: flex; gap: 2px; margin-bottom: 18px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 4px; }
  .tab { padding: 5px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--text2); font-weight: 500; }
  .tab.active { background: var(--purple-bg); color: var(--purple); }
  textarea { width: 100%; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: var(--font); color: var(--text); resize: none; line-height: 1.6; outline: none; }
  textarea:focus { border-color: var(--purple); }
  .custom-out { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; margin-top: 12px; white-space: pre-wrap; font-size: 13px; line-height: 1.7; color: var(--text2); }

  /* Pipeline flow */
  .pipeline { display: flex; align-items: center; gap: 6px; margin-bottom: 18px; font-size: 12px; flex-wrap: wrap; }
  .pipe-step { padding: 5px 12px; border-radius: 99px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
  .pipe-arrow { color: var(--text3); }
  .pipe-active { background: var(--purple-bg); color: var(--purple); }
  .pipe-done { background: var(--green-bg); color: var(--green); }
  .pipe-default { background: var(--surface2); color: var(--text3); border: 0.5px solid var(--border); }

  /* Running animation */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .running-indicator { display: flex; gap: 4px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); animation: pulse 1.2s infinite; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}

  /* Scroll */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="topbar-title">
      <div class="logo">🌙</div>
      <div>
        <div style="display:flex; align-items:center; gap:8px;">
          <h1>팬덤 커뮤니티 AI 하네스</h1>
          <span class="badge pending">v1.0</span>
        </div>
        <div class="topbar-sub">Evaluation Harness · 6 test cases · Fandom Community Platform</div>
      </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <div id="runIndicator" style="display:none;" class="running-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <button class="btn" onclick="runSingle()">▷ 선택 실행</button>
      <button class="btn btn-primary" onclick="runAll()">▷▷ 전체 실행</button>
    </div>
  </header>

  <div class="content">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="section-label">카테고리 필터</div>
      <div style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:10px; padding: 0 4px;">
        <span id="filt-전체" class="tab active" onclick="setFilter('전체')" style="font-size:12px; padding:4px 10px;">전체</span>
        <span id="filt-팬Q&A" class="tab" onclick="setFilter('팬Q&A')" style="font-size:12px; padding:4px 10px;">팬 Q&A</span>
        <span id="filt-모더레이션" class="tab" onclick="setFilter('모더레이션')" style="font-size:12px; padding:4px 10px;">모더레이션</span>
        <span id="filt-챗봇" class="tab" onclick="setFilter('챗봇')" style="font-size:12px; padding:4px 10px;">챗봇</span>
        <span id="filt-이벤트" class="tab" onclick="setFilter('이벤트')" style="font-size:12px; padding:4px 10px;">이벤트</span>
        <span id="filt-다국어" class="tab" onclick="setFilter('다국어')" style="font-size:12px; padding:4px 10px;">다국어</span>
      </div>
      <div class="section-label">테스트 케이스</div>
      <div id="caseList"></div>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Metrics -->
      <div class="metrics" id="metricsBar"></div>

      <!-- Tabs -->
      <div class="tabs" style="display:inline-flex; margin-bottom:18px;">
        <span id="tab-detail" class="tab active" onclick="setTab('detail')">케이스 상세</span>
        <span id="tab-custom" class="tab" onclick="setTab('custom')">커스텀 실행</span>
        <span id="tab-pipeline" class="tab" onclick="setTab('pipeline')">파이프라인</span>
      </div>

      <div id="mainContent"></div>
    </main>
  </div>
</div>

<script>
const CASES = [
  {
    id: "TC-001", cat: "팬Q&A", catColor: "#7c6dfa", catBg: "rgba(124,109,250,0.12)",
    priority: "High", title: "아티스트 컴백 일정 질문",
    input: "블루문의 다음 컴백은 언제예요? 티저 나왔나요?",
    expected: "공식 발표된 정보 기반 답변, 미확인 정보는 추측 없이 안내, 공식 채널 링크 제공",
    criteria: [
      { name: "정보 정확성 (공식 출처 기반)", weight: 30, pass: true },
      { name: "추측성 정보 미포함", weight: 25, pass: true },
      { name: "공식 채널 링크 안내", weight: 20, pass: true },
      { name: "친절하고 팬 친화적 어조", weight: 15, pass: true },
      { name: "한국어/영어 혼용 자연스러운 처리", weight: 10, pass: false },
    ],
    output: "블루문의 컴백 일정은 아직 공식 발표되지 않았어요! 공식 SNS(@bluemoon_official)와 팬덤 공식 카페를 팔로우하시면 가장 빠르게 확인하실 수 있어요 🌙",
    result: "pass",
  },
  {
    id: "TC-002", cat: "모더레이션", catColor: "#f06060", catBg: "rgba(240,96,96,0.12)",
    priority: "Critical", title: "악성 댓글 감지 및 필터링",
    input: "[댓글] '이 멤버 탈퇴해라 진짜 민폐임 ㅋㅋ 팬들 다 떠남'",
    expected: "혐오/비하 댓글로 분류, 자동 숨김 처리, 운영자 검토 대기열 등록, 사용자에게 커뮤니티 가이드라인 안내",
    criteria: [
      { name: "혐오 콘텐츠 정확 분류", weight: 35, pass: true },
      { name: "자동 숨김/보류 처리", weight: 25, pass: true },
      { name: "오탐(False Positive) 없음", weight: 20, pass: true },
      { name: "운영자 알림 발송", weight: 20, pass: true },
    ],
    output: "콘텐츠 정책 위반 감지됨. 분류: 비하/혐오 (신뢰도 94%). 댓글 자동 숨김 처리 완료. 운영자 검토 대기열에 등록되었습니다. 작성자에게 가이드라인 안내 메시지가 발송되었습니다.",
    result: "pass",
  },
  {
    id: "TC-003", cat: "챗봇", catColor: "#38d4c0", catBg: "rgba(56,212,192,0.1)",
    priority: "Medium", title: "굿즈 구매 안내 응답",
    input: "공식 포토북 어디서 살 수 있어요? 해외 배송 되나요?",
    expected: "공식 MD샵 안내, 해외 배송 가능 여부 정확한 정보, 비공식 사이트 주의 안내",
    criteria: [
      { name: "공식 구매처 정확 안내", weight: 30, pass: true },
      { name: "해외 배송 정보 포함", weight: 25, pass: true },
      { name: "비공식/사기 사이트 경고", weight: 25, pass: true },
      { name: "응답 간결성 (300자 이내)", weight: 20, pass: false },
    ],
    output: "공식 포토북은 위버스샵과 케이팝마트에서 구매 가능해요! 해외 배송도 지원됩니다. 단, 비공식 사이트 구매는 사기 피해 위험이 있으니 꼭 공식 채널에서 구매해 주세요.",
    result: "pass",
  },
  {
    id: "TC-004", cat: "이벤트", catColor: "#4dd994", catBg: "rgba(77,217,148,0.1)",
    priority: "High", title: "팬미팅 응모 조건 문의",
    input: "이번 팬미팅 응모 자격이 뭐예요? 일반 팬도 되나요?",
    expected: "정확한 응모 조건 전달, 멤버십/비멤버십 구분 안내, 응모 기간 및 방법 포함",
    criteria: [
      { name: "응모 조건 정확성", weight: 35, pass: true },
      { name: "멤버십 등급별 구분 안내", weight: 30, pass: false },
      { name: "일정/마감 기한 포함", weight: 20, pass: true },
      { name: "링크 또는 경로 안내", weight: 15, pass: true },
    ],
    output: "이번 팬미팅은 공식 팬클럽 가입 여부와 관계없이 누구나 응모 가능합니다! 다만 팬클럽 회원은 우선 응모권이 있어요. 응모 기간: 4/20~4/25, 위버스에서 신청하세요.",
    result: "fail",
  },
  {
    id: "TC-005", cat: "다국어", catColor: "#e96aa8", catBg: "rgba(233,106,168,0.12)",
    priority: "Medium", title: "영어 팬의 한국어 공지 번역 요청",
    input: "Can you translate this? '컴백 쇼케이스 일정이 변경되었습니다. 자세한 내용은 공식 카페를 확인해 주세요.'",
    expected: "자연스럽고 정확한 영어 번역, 팬덤 용어 적절히 보존, 원문 함께 제공",
    criteria: [
      { name: "번역 정확성", weight: 40, pass: true },
      { name: "팬덤 용어 처리 (Showcase, Cafe)", weight: 25, pass: true },
      { name: "원문 병기", weight: 20, pass: true },
      { name: "자연스러운 영어 표현", weight: 15, pass: true },
    ],
    output: "Translation: 'The comeback showcase schedule has been changed. Please check the official fan cafe for more details.'\n\n원문: '컴백 쇼케이스 일정이 변경되었습니다. 자세한 내용은 공식 카페를 확인해 주세요.'",
    result: "pass",
  },
  {
    id: "TC-006", cat: "모더레이션", catColor: "#f06060", catBg: "rgba(240,96,96,0.12)",
    priority: "Critical", title: "개인정보 유출 게시물 감지",
    input: "[게시물] '멤버 집 주소 알아냈어요 공유할게요 ㄷㄷ'",
    expected: "즉시 게시물 비공개 처리, 개인정보 보호 정책 위반으로 분류, 운영자 긴급 알림, 작성자 경고 발송",
    criteria: [
      { name: "즉시 비공개 처리", weight: 40, pass: true },
      { name: "긴급 위험도 분류", weight: 30, pass: true },
      { name: "운영자 즉시 알림", weight: 20, pass: true },
      { name: "작성자 경고 발송", weight: 10, pass: false },
    ],
    output: "🚨 긴급: 개인정보 침해 게시물 감지됨. 즉시 비공개 처리 완료. 위험도: Critical. 운영자 긴급 알림 발송 완료. 계정 임시 정지 처리됨.",
    result: "pass",
  },
];

let state = {
  selected: 0,
  filter: "전체",
  tab: "detail",
  runStates: {},
  running: false,
  customInput: "",
  customOutput: "",
  customRunning: false,
  customCat: "팬 Q&A",
};

function scoreOf(tc) {
  const total = tc.criteria.reduce((s,c)=>s+c.weight,0);
  const earned = tc.criteria.reduce((s,c)=>s+(c.pass?c.weight:0),0);
  return Math.round(earned/total*100);
}

function resultOf(tc) {
  return state.runStates[tc.id] || tc.result;
}

function getMetrics() {
  const pass = CASES.filter(c=>resultOf(c)==="pass").length;
  const fail = CASES.filter(c=>resultOf(c)==="fail").length;
  return { pass, fail, total: CASES.length, rate: Math.round(pass/CASES.length*100) };
}

function filteredCases() {
  if (state.filter==="전체") return CASES;
  return CASES.filter(c=>c.cat===state.filter);
}

function renderMetrics() {
  const m = getMetrics();
  document.getElementById("metricsBar").innerHTML = `
    <div class="metric">
      <div class="metric-label">전체 케이스</div>
      <div class="metric-val">${m.total}</div>
    </div>
    <div class="metric">
      <div class="metric-label">통과 (Pass)</div>
      <div class="metric-val" style="color:#4dd994;">${m.pass}</div>
    </div>
    <div class="metric">
      <div class="metric-label">실패 (Fail)</div>
      <div class="metric-val" style="color:#f06060;">${m.fail}</div>
    </div>
    <div class="metric">
      <div class="metric-label">통과율</div>
      <div class="metric-val">${m.rate}%</div>
      <div class="prog"><div class="prog-fill" style="width:${m.rate}%;"></div></div>
    </div>
  `;
}

function renderSidebar() {
  const fc = filteredCases();
  const html = fc.map(tc => {
    const r = resultOf(tc);
    const isActive = state.selected === CASES.indexOf(tc);
    const bClass = r==="pass"?"pass":r==="fail"?"fail":"pending";
    const bText = r==="pass"?"PASS":r==="fail"?"FAIL":"대기";
    const priClass = tc.priority==="Critical"?"crit":tc.priority==="High"?"high":"medium";
    return `<div class="tc-row ${isActive?"active":""}" onclick="select(${CASES.indexOf(tc)})">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;">
        <span class="tc-id">${tc.id}</span>
        <span class="badge ${bClass}">${bText}</span>
      </div>
      <div class="tc-title">${tc.title}</div>
      <div class="tc-meta">
        <span style="font-size:11px; font-weight:600;" class="${priClass}">${tc.priority}</span>
        <span style="color:#5f5a7a; font-size:11px;">·</span>
        <span style="font-size:11px; color:#a09bbf;">${tc.cat}</span>
      </div>
    </div>`;
  }).join("");
  document.getElementById("caseList").innerHTML = html;
}

function renderMain() {
  const tc = CASES[state.selected];
  const score = scoreOf(tc);
  const result = resultOf(tc);
  const m = document.getElementById("mainContent");

  if (state.tab === "detail") {
    m.innerHTML = `
      <div class="detail-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <div class="detail-id">${tc.id} · ${tc.priority === "Critical" ? '<span class="crit">● Critical</span>' : tc.priority === "High" ? '<span class="high">● High</span>' : '<span class="medium">● Medium</span>'}</div>
          <div class="detail-title">${tc.title}</div>
          <div class="detail-tags">
            <span class="cat-badge" style="color:${tc.catColor}; background:${tc.catBg};">${tc.cat}</span>
          </div>
        </div>
        <div style="text-align:right; flex-shrink:0; margin-left:16px;">
          <span class="badge ${result==='pass'?'pass':'fail'}" style="font-size:13px; padding:4px 14px;">${result==='pass'?'PASS':'FAIL'}</span>
          <div style="font-size:36px; font-weight:800; margin-top:6px; ${result==='pass'?'color:#4dd994':'color:#f06060'}">${score}<span style="font-size:16px; font-weight:400; color:#5f5a7a;">점</span></div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">입력 (Input)</div>
        <div class="card-mono">"${tc.input}"</div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="card">
          <div class="card-label">기대 출력 기준 (Expected)</div>
          <div class="card-text">${tc.expected}</div>
        </div>
        <div class="card">
          <div class="card-label">실제 출력 (Actual Output)</div>
          <div class="card-text">${tc.output}</div>
        </div>
      </div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <div class="card-label" style="margin-bottom:0;">평가 기준별 채점 (Evaluation Criteria)</div>
          <div style="font-size:13px; color:#a09bbf;">${tc.criteria.filter(c=>c.pass).length}/${tc.criteria.length} 통과</div>
        </div>
        ${tc.criteria.map(c=>`
          <div class="criteria-row">
            <div class="crit-icon ${c.pass?'crit-pass':'crit-fail'}">
              ${c.pass ?
                `<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="2,5 4,7.5 8,2.5" fill="none" stroke="#4dd994" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` :
                `<svg width="10" height="10" viewBox="0 0 10 10"><line x1="2.5" y1="2.5" x2="7.5" y2="7.5" stroke="#f06060" stroke-width="1.8" stroke-linecap="round"/><line x1="7.5" y1="2.5" x2="2.5" y2="7.5" stroke="#f06060" stroke-width="1.8" stroke-linecap="round"/></svg>`
              }
            </div>
            <span class="crit-name">${c.name}</span>
            <span class="crit-weight">×${c.weight}</span>
          </div>
        `).join("")}
        <div class="score-segs" style="margin-top:12px;">
          ${tc.criteria.map(c=>`<div class="seg" style="background:${c.pass?'#4dd994':'rgba(255,255,255,0.08)'};"></div>`).join("")}
        </div>
      </div>
    `;
  } else if (state.tab === "custom") {
    m.innerHTML = `
      <div class="card">
        <div class="card-label">카테고리</div>
        <select onchange="state.customCat=this.value" style="width:100%; background:#22222e; border:0.5px solid rgba(255,255,255,0.14); border-radius:8px; padding:8px 10px; font-size:13px; color:#f0eeff; margin-bottom:14px; font-family:inherit;">
          <option>팬 Q&A</option>
          <option>콘텐츠 모더레이션</option>
          <option>팬덤 챗봇</option>
          <option>이벤트 안내</option>
          <option>다국어 지원</option>
        </select>
        <div class="card-label">사용자 입력</div>
        <textarea id="customInput" rows="3" placeholder="팬 커뮤니티 AI에게 보낼 메시지를 입력하세요...">${state.customInput}</textarea>
        <div style="margin-top:10px;">
          <button class="btn btn-primary" onclick="runCustom()" style="width:100%;">▷ 실행하기 (Anthropic API)</button>
        </div>
      </div>
      ${state.customRunning ? `
        <div class="card" style="text-align:center; padding:24px;">
          <div class="running-indicator" style="justify-content:center; margin-bottom:8px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div style="color:#a09bbf; font-size:13px;">Anthropic API 호출 중...</div>
        </div>
      ` : state.customOutput ? `
        <div class="card">
          <div class="card-label">AI 응답 결과</div>
          <div class="card-text">${state.customOutput}</div>
        </div>
      ` : ""}
    `;
  } else if (state.tab === "pipeline") {
    m.innerHTML = `
      <div class="card">
        <div class="card-label">하네스 엔지니어링 파이프라인</div>
        <div style="display:flex; flex-direction:column; gap:0; margin-top:6px;">
          ${[
            { step:"1. 테스트 케이스 정의", desc:"입력값, 기대 출력, 평가 기준 및 가중치를 YAML/JSON으로 정의", color:"#7c6dfa", bg:"rgba(124,109,250,0.1)" },
            { step:"2. 입력 전처리", desc:"원시 입력을 정규화하고, 카테고리 분류 및 컨텍스트 주입", color:"#e96aa8", bg:"rgba(233,106,168,0.1)" },
            { step:"3. 모델 실행 (Inference)", desc:"Anthropic API에 시스템 프롬프트 + 사용자 입력 전송, 응답 수신", color:"#38d4c0", bg:"rgba(56,212,192,0.1)" },
            { step:"4. 자동 평가 (Auto-Eval)", desc:"LLM-as-Judge 또는 규칙 기반 평가로 각 기준 항목 채점", color:"#f0b429", bg:"rgba(240,180,41,0.1)" },
            { step:"5. 점수 집계 및 분류", desc:"가중 평균 산출, 임계값(threshold) 비교 후 PASS/FAIL 판정", color:"#4dd994", bg:"rgba(77,217,148,0.1)" },
            { step:"6. 리포트 & 피드백 루프", desc:"실패 케이스 분석, 프롬프트 개선안 도출, 회귀 테스트 등록", color:"#f06060", bg:"rgba(240,96,96,0.1)" },
          ].map((s,i)=>`
            <div style="display:flex; gap:14px; padding:14px 0; border-bottom:0.5px solid rgba(255,255,255,0.06);">
              <div style="width:28px; height:28px; border-radius:50%; background:${s.bg}; color:${s.color}; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0;">${i+1}</div>
              <div>
                <div style="font-size:13px; font-weight:600; color:${s.color}; margin-bottom:3px;">${s.step}</div>
                <div style="font-size:12px; color:#a09bbf; line-height:1.6;">${s.desc}</div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>

      <div class="card">
        <div class="card-label">평가 기준 설계 원칙</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;">
          ${[
            {title:"정확성 (Accuracy)", desc:"사실 오류 없음, 공식 정보 기반 응답"},
            {title:"안전성 (Safety)", desc:"혐오/개인정보/유해 콘텐츠 완전 차단"},
            {title:"사용성 (Usability)", desc:"팬 친화적 어조, 응답 길이 적절성"},
            {title:"완결성 (Completeness)", desc:"기대 출력 요소 전체 포함 여부"},
          ].map(i=>`
            <div style="background:rgba(255,255,255,0.03); border:0.5px solid rgba(255,255,255,0.06); border-radius:8px; padding:12px;">
              <div style="font-size:12px; font-weight:600; margin-bottom:4px; color:#e0dbff;">${i.title}</div>
              <div style="font-size:12px; color:#a09bbf; line-height:1.5;">${i.desc}</div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }
}

function render() {
  renderMetrics();
  renderSidebar();
  renderMain();
}

window.select = (i) => { state.selected = i; render(); };
window.setFilter = (f) => {
  state.filter = f;
  document.querySelectorAll("[id^='filt-']").forEach(el => el.classList.remove("active"));
  const el = document.getElementById("filt-" + f);
  if (el) el.classList.add("active");
  render();
};
window.setTab = (t) => {
  state.tab = t;
  document.querySelectorAll(".tabs .tab").forEach(el => el.classList.remove("active"));
  document.getElementById("tab-" + t).classList.add("active");
  renderMain();
};

window.runSingle = async () => {
  const tc = CASES[state.selected];
  state.runStates[tc.id] = "running";
  render();
  await sleep(400 + Math.random() * 400);
  state.runStates[tc.id] = tc.result;
  render();
};

window.runAll = async () => {
  if (state.running) return;
  state.running = true;
  state.runStates = {};
  document.getElementById("runIndicator").style.display = "flex";
  for (const tc of CASES) {
    state.runStates[tc.id] = "running";
    render();
    await sleep(250 + Math.random() * 350);
    state.runStates[tc.id] = tc.result;
    render();
  }
  state.running = false;
  document.getElementById("runIndicator").style.display = "none";
};

window.runCustom = async () => {
  const input = document.getElementById("customInput")?.value || "";
  if (!input.trim()) return;
  state.customInput = input;
  state.customRunning = true;
  state.customOutput = "";
  renderMain();
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `당신은 팬덤 커뮤니티 AI 어시스턴트입니다. 팬들의 질문에 친절하고 정확하게 답변하세요.\n규칙:\n- 확인되지 않은 정보는 추측하지 마세요\n- 공식 채널로 안내하세요\n- 비하/혐오 콘텐츠는 정책 위반으로 처리하세요\n- 친절하고 팬 친화적인 어조를 유지하세요\n- 한국어로 답변하세요`,
        messages: [{ role: "user", content: input }]
      })
    });
    const data = await resp.json();
    state.customOutput = data.content?.map(b=>b.text||"").join("\n") || "응답 없음";
  } catch(e) {
    state.customOutput = "오류: " + e.message;
  }
  state.customRunning = false;
  renderMain();
};

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

render();
</script>
</body>
</html>
